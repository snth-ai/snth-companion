<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>SNTH Companion Relay — Options</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; max-width: 420px; color: #1f2937; }
    h1 { font-size: 16px; margin: 0 0 12px 0; }
    label { display: block; font-size: 12px; color: #6b7280; margin: 12px 0 4px 0; }
    input { width: 100%; padding: 6px 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 6px 12px; background: #3b82f6; color: white; border: 0; border-radius: 4px; font-size: 13px; cursor: pointer; }
    .note { color: #6b7280; font-size: 12px; margin-top: 12px; }
    code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>SNTH Companion Relay</h1>
  <label for="port">Relay port</label>
  <input id="port" type="number" placeholder="18792" />
  <button id="save">Save</button>
  <div id="status" class="note"></div>
  <p class="note">
    Default is <code>18792</code>. Change only if you also changed
    the companion's relay port (advanced).
  </p>
</body>
<script src="options.js"></script>
</html>
